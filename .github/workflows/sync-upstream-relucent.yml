name: Sync Upstream relucent

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compare upstream and PyPI versions
        id: compare
        run: |
          python - <<'PY'
          import json
          import pathlib
          import urllib.request

          local_pyproject = pathlib.Path("deps/relucent-py/pyproject.toml").read_text()
          local_version = next(
              line.split("=")[1].strip().strip('"')
              for line in local_pyproject.splitlines()
              if line.strip().startswith("version =")
          )
          with urllib.request.urlopen("https://pypi.org/pypi/relucent/json", timeout=15) as resp:
              pypi_version = json.load(resp)["info"]["version"]

          print(f"local_version={local_version}")
          print(f"pypi_version={pypi_version}")
          with open("/tmp/version_outputs", "w", encoding="utf-8") as fp:
              fp.write(f"local={local_version}\n")
              fp.write(f"pypi={pypi_version}\n")
              fp.write(f"changed={'true' if local_version != pypi_version else 'false'}\n")
          PY
          cat /tmp/version_outputs >> "$GITHUB_OUTPUT"

      - name: Update submodule when published version changed
        if: steps.compare.outputs.changed == 'true'
        run: |
          git submodule update --remote deps/relucent-py
          git add deps/relucent-py

      - name: Create pull request
        if: steps.compare.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-relucent-submodule
          title: "chore: sync relucent submodule to latest release"
          commit-message: "chore: sync relucent submodule to latest release"
          body: |
            Sync `deps/relucent-py` after a new `relucent` release was detected on PyPI.

            - Local submodule version: `${{ steps.compare.outputs.local }}`
            - Published version: `${{ steps.compare.outputs.pypi }}`
